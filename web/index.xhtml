<?xml version='1.0' encoding='UTF-8' ?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/base.xhtml">

    <ui:define name="body">
        <h:form>
            <div class="text-center mb-5"> 
                <h1 style="font-weight: 300;">Panel de Gestión del Concesionario</h1>
            </div>
            <div class="grid">
                <div class="col-12 md:col-6 lg:col-4">
                    <p:panel header="STOCK VEHÍCULOS">
                        <div class="flex flex-column">
                            <p:commandLink action="#{vehiculoCtrl.prepararNuevo}" 
                                           update=":formNuevoVehiculo"
                                           oncomplete="PF('dlgVehiculo').show();"
                                           styleClass="mb-2"
                                           process="@this">
                                <h:outputText value="Registrar nuevo vehículo" />
                            </p:commandLink>
                            <p:link outcome="vehiculos.xhtml" value="Ver catálogo de stock" />
                        </div>
                    </p:panel>
                </div>

                <div class="col-12 md:col-6 lg:col-4">
                    <p:panel header="CLIENTES">
                        <div class="flex flex-column">
                            <p:link outcome="index.xhtml" value="Alta de cliente" 
                                    styleClass="mb-2"/>
                            <p:link outcome="index.xhtml" value="Cartera de clientes" />
                        </div>
                    </p:panel>
                </div>

                <div class="col-12 md:col-6 lg:col-4">
                    <p:panel header="OPERACIONES">
                        <div class="flex flex-column">
                            <p:link outcome="index.xhtml" value="Registrar Venta" 
                                    styleClass="mb-2"/>
                            <p:link outcome="index.xhtml" value="Historial de Facturación" />
                        </div>
                    </p:panel>
                </div>

            </div>

            <div class="grid mt-4">
                <div class="col-12">
                    <p:fieldset legend="ESTADO GENERAL">
                        <div class="grid">
                            <div class="col text-center">
                                <h:outputText value="Vehículos disponibles: 5"/>
                            </div>
                            <div class="col text-center">
                                <h:outputText value="Ventas realizadas: 1"/>
                            </div>
                        </div>
                    </p:fieldset>
                </div>
            </div>
        </h:form>

        <p:dialog header="Gestión de Vehículo" 
                  id="dlgVehiculo" 
                  widgetVar="dlgVehiculo" 
                  modal="true" 
                  responsive="true" 
                  width="600">

            <h:form id="formNuevoVehiculo">
                <p:messages id="msgsDialog" closable="true" />

                <div class="ui-fluid grid">
                    <div class="col-12 md:col-6">
                        <p:outputLabel for="marca" value="Marca" />
                        <p:selectOneMenu id="marca" value="#{vehiculoCtrl.nuevoVehiculo.vehiculoPK.idMarca}" required="true">
                            <f:selectItem itemLabel="Seleccione marca" itemValue="0" noSelectionOption="true"/>
                            <f:selectItems value="#{vehiculoCtrl.listaMarcas}" var="m" 
                                           itemLabel="#{m.nombre}" itemValue="#{m.id}" />
                        </p:selectOneMenu>
                    </div>
                    <div class="col-12 md:col-6">
                        <p:outputLabel for="bastidor" value="Nº Bastidor" />
                        <p:inputText id="bastidor" value="#{vehiculoCtrl.nuevoVehiculo.vehiculoPK.numBastidor}" 
                                     required="true" maxlength="17" />
                    </div>

                    <div class="col-12 md:col-6">
                        <p:outputLabel for="modelo" value="Modelo" />
                        <p:inputText id="modelo" value="#{vehiculoCtrl.nuevoVehiculo.modelo}" required="true" />
                    </div>
                    <div class="col-12 md:col-6">
                        <p:outputLabel for="matricula" value="Matrícula" />
                        <p:inputText id="matricula" value="#{vehiculoCtrl.nuevoVehiculo.matricula}" />
                    </div>

                    <div class="col-12 md:col-4">
                        <p:outputLabel for="anio" value="Año" />
                        <p:spinner id="anio" value="#{vehiculoCtrl.nuevoVehiculo.anio}" min="1900" max="2100" />
                    </div>
                    <div class="col-12 md:col-4">
                        <p:outputLabel for="combustible" value="Combustible" />
                        <p:selectOneMenu id="combustible" value="#{vehiculoCtrl.nuevoVehiculo.combustible}">
                            <f:selectItem itemLabel="Gasolina" itemValue="Gasolina" />
                            <f:selectItem itemLabel="Diésel" itemValue="Diesel" />
                            <f:selectItem itemLabel="Eléctrico" itemValue="Electrico" />
                            <f:selectItem itemLabel="Híbrido" itemValue="Hibrido" />
                        </p:selectOneMenu>
                    </div>
                    <div class="col-12 md:col-4">
                        <p:outputLabel for="precio" value="Precio" />
                        <p:inputNumber id="precio" value="#{vehiculoCtrl.nuevoVehiculo.precio}" symbol=" €" symbolPosition="s" />
                    </div>

                    <div class="col-12">
                        <p:outputLabel for="descripcion" value="Descripción" />
                        <p:inputTextarea id="descripcion" value="#{vehiculoCtrl.nuevoVehiculo.descripcion}" rows="3" />
                    </div>
                </div>

                <div class="flex justify-content-end gap-2 mt-3">
                    <p:commandButton value="Cancelar" icon="pi pi-times" 
                                     onclick="PF('dlgVehiculo').hide();" 
                                     styleClass="ui-button-flat" process="@this" />
                    <p:commandButton value="Guardar Vehículo" icon="pi pi-check" 
                                     action="#{vehiculoCtrl.save}" 
                                     update="formNuevoVehiculo" />
                </div>
            </h:form>
        </p:dialog>

    </ui:define>

</ui:composition>
