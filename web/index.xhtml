<?xml version='1.0' encoding='UTF-8' ?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/base.xhtml">

    <ui:define name="body">
        <div class="text-center mb-5"> 
            <h1 style="font-weight: 300;">Panel de Gestión del Concesionario</h1>
        </div>

        <div class="grid">

            <div class="col-12 md:col-6 lg:col-4">
                <p:panel header="STOCK VEHÍCULOS">
                    <div class="flex flex-column">
                        <p:link outcome="index.xhtml" value="Registrar nuevo vehículo" 
                                styleClass="mb-2"/>
                        <p:link outcome="pages/vehiculos.xhtml" value="Ver catálogo de stock" />
                    </div>
                </p:panel>
            </div>

            <div class="col-12 md:col-6 lg:col-4">
                <p:panel header="CLIENTES">
                    <div class="flex flex-column">
                        <p:link outcome="index.xhtml" value="Alta de cliente" 
                                styleClass="mb-2"/>
                        <p:link outcome="index.xhtml" value="Cartera de clientes" />
                    </div>
                </p:panel>
            </div>

            <div class="col-12 md:col-6 lg:col-4">
                <p:panel header="OPERACIONES">
                    <div class="flex flex-column">
                        <p:link outcome="index.xhtml" value="Registrar Venta" 
                                styleClass="mb-2"/>
                        <p:link outcome="index.xhtml" value="Historial de Facturación" />
                    </div>
                </p:panel>
            </div>

        </div>

        <div class="grid mt-4">
            <div class="col-12">
                <p:fieldset legend="ESTADO GENERAL">
                    <div class="grid">
                        <div class="col text-center">
                            <h:outputText value="Vehículos disponibles: 5"/>
                        </div>
                        <div class="col text-center">
                            <h:outputText value="Ventas realizadas: 1"/>
                        </div>
                    </div>
                </p:fieldset>
            </div>
        </div>
    </ui:define>

</ui:composition>
