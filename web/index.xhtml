<?xml version='1.0' encoding='UTF-8' ?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/base.xhtml">

    <ui:define name="body">

        <!--
            UN SOLO h:form para toda la página.
            El p:dialog va DENTRO del form — así los botones del dialog
            siempre son hijos del <form> en el DOM, sea cual sea la versión
            de PrimeFaces y aunque el dialog se reposicione con JS.
            Los h:form anidados no están soportados en HTML y causan el
            warning "button must be inside a form".
        -->
        <h:form id="mainForm">

            <p:growl id="growlIndex" showDetail="true" life="4000"/>

            <div class="text-center mb-5">
                <h1 style="font-weight: 300;">Panel de Gestión del Concesionario</h1>
            </div>

            <div class="grid">

                <div class="col-12 md:col-6 lg:col-4">
                    <p:panel header="STOCK VEHÍCULOS">
                        <div class="flex flex-column">
                            <p:commandLink action="#{vehiculoCtrl.prepararNuevo}"
                                           update=":mainForm:dlgVehiculo"
                                           oncomplete="PF('dlgVehiculo').show();"
                                           styleClass="mb-2"
                                           process="@this">
                                <h:outputText value="Registrar nuevo vehículo"/>
                            </p:commandLink>
                            <a href="vehiculos.xhtml" style="text-decoration:none; color:#555;">
                                Ver catálogo de stock
                            </a>
                        </div>
                    </p:panel>
                </div>

                <div class="col-12 md:col-6 lg:col-4">
                    <p:panel header="CLIENTES">
                        <div class="flex flex-column">
                            <a href="clientes.xhtml" class="mb-2"
                               style="text-decoration:none; color:#4caf50; font-weight:bold;">
                                Alta de cliente
                            </a>
                            <a href="clientes.xhtml" style="text-decoration:none; color:#555;">
                                Cartera de clientes
                            </a>
                        </div>
                    </p:panel>
                </div>

                <div class="col-12 md:col-6 lg:col-4">
                    <p:panel header="OPERACIONES">
                        <div class="flex flex-column">
                            <a href="ventas.xhtml" class="mb-2"
                               style="text-decoration:none; color:#ff9800; font-weight:bold;">
                                Registrar venta
                            </a>
                            <a href="ventas.xhtml" style="text-decoration:none; color:#555;">
                                Historial de facturación
                            </a>
                        </div>
                    </p:panel>
                </div>

            </div>

            <div class="grid mt-4">
                <div class="col-12">
                    <p:fieldset legend="ESTADO GENERAL">
                        <div class="grid">
                            <div class="col text-center">
                                <h:outputText value="Vehículos disponibles: 5"/>
                            </div>
                            <div class="col text-center">
                                <h:outputText value="Ventas realizadas: 1"/>
                            </div>
                        </div>
                    </p:fieldset>
                </div>
            </div>

            <!-- ═══════════════════════════════════════════════════
                 DIALOG dentro del mismo h:form — los botones son
                 hijos directos del form en el DOM sin excepción.
                 ═══════════════════════════════════════════════════ -->
            <p:dialog id="dlgVehiculo"
                      header="Gestión de Vehículo"
                      widgetVar="dlgVehiculo"
                      modal="true"
                      responsive="true"
                      width="600">

                <p:messages id="msgsDialog" closable="true"/>

                <div class="ui-fluid grid">

                    <div class="col-12 md:col-6">
                        <p:outputLabel for="marca" value="Marca"/>
                        <p:selectOneMenu id="marca"
                                         value="#{vehiculoCtrl.nuevoVehiculo.vehiculoPK.idMarca}"
                                         required="true">
                            <!-- itemValue="0" porque idMarca es int primitivo:
                                 "" no convierte y el error se pierde en silencio -->
                            <f:selectItem itemLabel="Seleccione marca" itemValue="0"
                                          noSelectionOption="true"/>
                            <f:selectItems value="#{vehiculoCtrl.listaMarcas}" var="m"
                                           itemLabel="#{m.nombre}" itemValue="#{m.id}"/>
                        </p:selectOneMenu>
                        <p:message for="marca"/>
                    </div>

                    <div class="col-12 md:col-6">
                        <p:outputLabel for="bastidor" value="Nº Bastidor"/>
                        <p:inputText id="bastidor"
                                     value="#{vehiculoCtrl.nuevoVehiculo.vehiculoPK.numBastidor}"
                                     required="true" maxlength="17"/>
                        <p:message for="bastidor"/>
                    </div>

                    <div class="col-12 md:col-6">
                        <p:outputLabel for="modelo" value="Modelo"/>
                        <p:inputText id="modelo"
                                     value="#{vehiculoCtrl.nuevoVehiculo.modelo}"
                                     required="true"/>
                        <p:message for="modelo"/>
                    </div>

                    <div class="col-12 md:col-6">
                        <p:outputLabel for="matricula" value="Matrícula"/>
                        <p:inputText id="matricula"
                                     value="#{vehiculoCtrl.nuevoVehiculo.matricula}"/>
                    </div>

                    <div class="col-12 md:col-4">
                        <p:outputLabel for="anio" value="Año"/>
                        <p:spinner id="anio"
                                   value="#{vehiculoCtrl.nuevoVehiculo.anio}"
                                   min="1900" max="2100"/>
                    </div>

                    <div class="col-12 md:col-4">
                        <p:outputLabel for="combustible" value="Combustible"/>
                        <p:selectOneMenu id="combustible"
                                         value="#{vehiculoCtrl.nuevoVehiculo.combustible}">
                            <f:selectItem itemLabel="Gasolina"  itemValue="GASOLINA"/>
                            <f:selectItem itemLabel="Diésel"    itemValue="DIESEL"/>
                            <f:selectItem itemLabel="Eléctrico" itemValue="ELECTRICO"/>
                            <f:selectItem itemLabel="Híbrido"   itemValue="HIBRIDO"/>
                        </p:selectOneMenu>
                    </div>

                    <div class="col-12 md:col-4">
                        <p:outputLabel for="precio" value="Precio"/>
                        <p:inputNumber id="precio"
                                       value="#{vehiculoCtrl.nuevoVehiculo.precio}"
                                       symbol=" €" symbolPosition="s"/>
                        <p:message for="precio"/>
                    </div>

                    <div class="col-12">
                        <p:outputLabel for="descripcion" value="Descripción"/>
                        <p:inputTextarea id="descripcion"
                                         value="#{vehiculoCtrl.nuevoVehiculo.descripcion}"
                                         rows="3"/>
                    </div>

                </div>

                <div class="flex justify-content-end gap-2 mt-3">
                    <p:commandButton value="Cancelar"
                                     icon="pi pi-times"
                                     onclick="PF('dlgVehiculo').hide();"
                                     styleClass="ui-button-flat"
                                     process="@none"/>
                    <p:commandButton value="Guardar Vehículo"
                                     icon="pi pi-check"
                                     action="#{vehiculoCtrl.save}"
                                     process="@form"
                                     update=":mainForm:msgsDialog :mainForm:growlIndex"/>
                </div>

            </p:dialog>

        </h:form>

    </ui:define>

</ui:composition>
